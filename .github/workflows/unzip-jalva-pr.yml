name: Unzip into a jalva (create PR)
on:
  push:
    paths:
      - '**.zip'
      - '.github/workflows/unzip-jalva-pr.yml'

# This grants the GITHUB_TOKEN permission to push code and open PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  unzip-to-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract zips into jalva
        run: |
          mkdir -p jalva
          if compgen -G "*.zip" > /dev/null; then
            for z in *.zip; do
              echo "Extracting $z into jalva..."
              unzip -o "$z" -d jalva
            done
          else
            echo "No zip files found at the root."
            exit 0
          fi

      - name: Show sample of jalva
        run: ls -la jalva | head -n 50

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Unzip: add extracted files into jalva"
          branch: "unzip/jalva-updates"
          delete-branch: true
          title: "Unzip: extracted files into jalva"
          body: "Automated PR with files extracted from repository zip(s) into the jalva folder."
