name: Unzip into jalva
on:
  push:
    paths:
      - '1.zip'
      - '2.zip'
      - '3.zip'
      - '.github/workflows/unzip-jalva.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ensure unzip is available
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip git

      - name: Create jalva if missing
        run: mkdir -p jalva

      - name: Unzip files into jalva
        run: |
          for z in 1.zip 2.zip 3.zip; do
            if [ -f "$z" ]; then
              echo "Extracting $z"
              unzip -o "$z" -d jalva || echo "unzip failed for $z"
            else
              echo "$z not found, skipping"
            fi
          done

      - name: Show jalva contents
        run: ls -la jalva | sed -n '1,200p'

      - name: Commit and push extracted files
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "$GIT_COMMITTER_NAME"
          git config user.email "$GIT_COMMITTER_EMAIL"
          git add -A jalva
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Unzipped 1.zip 2.zip 3.zip into jalva"
          # Use repository token push (checkout provides correct remote)
          git push origin HEAD
